services:
  dashboard-mentoria:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-mentoria
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
